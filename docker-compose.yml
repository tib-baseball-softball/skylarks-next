services:
  diamondplanner:
    restart: unless-stopped
    env_file: .env
    networks:
      - proxy
    volumes:
      - pb_data:/app/pb_data
    image: obnoxieux/skylarks-diamond-planner:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.skylarks-next.rule=Host(`app.berlinskylarks.de`)"
      - "traefik.http.routers.skylarks-next.entrypoints=websecure"
      - "traefik.http.routers.skylarks-next.tls.certresolver=letsEncrypt"
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true

volumes:
  pb_data:
